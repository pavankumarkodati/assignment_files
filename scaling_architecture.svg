<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" font-family="'Segoe UI', Arial, Helvetica, sans-serif" role="img" aria-label="100,000x target-state architecture">
<title>Target-state architecture at 100,000× scale</title>
<desc>Streaming and CDC ingest feed an open Iceberg lakehouse on S3, then incrementally-maintained domain marts in Snowflake, a governed semantic layer, and a pre-aggregated cached serving tier reaching thousands of BI users, ML and reverse-ETL. A cross-cutting governance and FinOps band wraps everything.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBFBF9"/><stop offset="1" stop-color="#F1F3F6"/></linearGradient>
  <linearGradient id="titleg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4F46E5"/><stop offset="0.5" stop-color="#0E7490"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
  <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#0E7490"/></linearGradient>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#1F2937" flood-opacity="0.16"/></filter>
  <marker id="arw" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#475569" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="1180" height="720" fill="url(#bg)"/>
<text x="30" y="40" font-size="22" font-weight="700" fill="url(#titleg)">Target-State Architecture — 100,000× Scale</text>
<text x="30" y="62" font-size="13" fill="#6B7280">Streaming lakehouse · incremental domain marts · governed semantic layer · pre-aggregated serving</text>

<!-- ===== GOVERNANCE WRAPPER BAND ===== -->
<rect x="26" y="84" width="1128" height="556" rx="20" fill="#FFFFFF" stroke="#E2B7B0" stroke-width="1.5" stroke-dasharray="2 0"/>
<rect x="26" y="84" width="1128" height="34" rx="20" fill="#FCEEEC"/>
<rect x="26" y="100" width="1128" height="18" fill="#FCEEEC"/>
<text x="46" y="106" font-size="12.5" font-weight="700" fill="#9A3412">Wrapped around everything:</text>
<text x="256" y="106" font-size="12" fill="#B4541C">continuous DQ · lineage · masking &amp; row-access policies · resource monitors · FinOps</text>

<!-- inner working area y ≈ 132..628 -->

<!-- ============ STAGE 1: INGEST ============ -->
<text x="60" y="150" font-size="12" font-weight="700" fill="#3730A3">① STREAMING / CDC INGEST</text>
<g filter="url(#sh)"><rect x="56" y="160" width="216" height="120" rx="13" fill="#EEF0FE" stroke="#A5B0F5"/><rect x="56" y="160" width="6" height="120" rx="3" fill="#4F46E5"/></g>
<text x="166" y="186" font-size="13.5" font-weight="700" fill="#1E1B4B" text-anchor="middle">Event &amp; CDC sources</text>
<g font-size="11" text-anchor="middle" fill="#3F3D7A">
  <text x="166" y="210">Kafka · Kinesis · MSK</text>
  <text x="166" y="230">DMS · Debezium (CDC)</text>
  <text x="166" y="250">Snowpipe Streaming</text>
</g>
<g filter="url(#sh)"><rect x="80" y="294" width="168" height="40" rx="10" fill="#FFFFFF" stroke="#A5B0F5"/></g>
<text x="164" y="312" font-size="11.5" font-weight="700" fill="#3730A3" text-anchor="middle">Schema registry</text>
<text x="164" y="327" font-size="10" fill="#5B59A8" text-anchor="middle">+ data contracts</text>

<!-- ============ STAGE 2: LAKEHOUSE ============ -->
<text x="324" y="150" font-size="12" font-weight="700" fill="#0C447C">② OPEN LAKEHOUSE (S3)</text>
<g filter="url(#sh)"><rect x="320" y="160" width="216" height="174" rx="13" fill="#E8F1FB" stroke="#9FC6EC"/><rect x="320" y="160" width="6" height="174" rx="3" fill="#185FA5"/></g>
<text x="430" y="186" font-size="13.5" font-weight="700" fill="#0C447C" text-anchor="middle">Apache Iceberg on S3</text>
<g font-size="11" text-anchor="middle">
  <rect x="340" y="200" width="176" height="32" rx="7" fill="#FAEEDA" stroke="#C98A1E"/><text x="428" y="220" fill="#633806">raw (Bronze)</text>
  <rect x="340" y="238" width="176" height="32" rx="7" fill="#ECECE6" stroke="#9A9A90"/><text x="428" y="258" fill="#33332E">curated (Silver)</text>
  <rect x="340" y="276" width="176" height="32" rx="7" fill="#D7E8FB" stroke="#7FB2E6"/><text x="428" y="296" fill="#0C447C">multi-region · tiered</text>
</g>
<text x="428" y="324" font-size="10" fill="#5B7A99" text-anchor="middle" font-style="italic">hot in-warehouse · cold on S3</text>

<!-- ============ STAGE 3: DOMAIN MARTS ============ -->
<text x="588" y="150" font-size="12" font-weight="700" fill="#27500A">③ DOMAIN MARTS — SNOWFLAKE</text>
<g filter="url(#sh)"><rect x="584" y="160" width="216" height="174" rx="13" fill="#EAF3DE" stroke="#8FBF63"/><rect x="584" y="160" width="6" height="174" rx="3" fill="#3B6D11"/></g>
<text x="694" y="186" font-size="13.5" font-weight="700" fill="#27500A" text-anchor="middle">Incremental Gold marts</text>
<g font-size="11" text-anchor="middle">
  <rect x="604" y="200" width="176" height="30" rx="7" fill="#FFFFFF" stroke="#8FBF63"/><text x="692" y="219" fill="#27500A">sales · customer · product</text>
  <rect x="604" y="236" width="176" height="30" rx="7" fill="#FFFFFF" stroke="#8FBF63"/><text x="692" y="255" fill="#27500A">Dynamic Tables</text>
  <rect x="604" y="272" width="176" height="30" rx="7" fill="#FFFFFF" stroke="#8FBF63"/><text x="692" y="291" fill="#27500A">Streams + Tasks · HLL</text>
</g>
<text x="692" y="324" font-size="10" fill="#4B7327" text-anchor="middle" font-style="italic">data mesh — domain-owned</text>

<!-- ============ STAGE 4: SEMANTIC ============ -->
<text x="852" y="150" font-size="12" font-weight="700" fill="#085041">④ GOVERNED SEMANTIC LAYER</text>
<g filter="url(#sh)"><rect x="848" y="160" width="216" height="120" rx="13" fill="#DEF3EC" stroke="#5FC0A6"/><rect x="848" y="160" width="6" height="120" rx="3" fill="#0B6E56"/></g>
<text x="958" y="188" font-size="13.5" font-weight="700" fill="#085041" text-anchor="middle">Certified metrics</text>
<g font-size="11" text-anchor="middle" fill="#0F6E56">
  <text x="958" y="214">one definition of revenue</text>
  <text x="958" y="234">aggregate-aware routing</text>
  <text x="958" y="254">Semantic View / dbt</text>
</g>

<!-- ============ STAGE 5: SERVING (center-bottom) ============ -->
<text x="588" y="372" font-size="12" font-weight="700" fill="#7C2D12">⑤ PRE-AGGREGATED / CACHED SERVING</text>
<g filter="url(#sh)"><rect x="584" y="382" width="216" height="96" rx="13" fill="#FFF3E9" stroke="#E9A368"/><rect x="584" y="382" width="6" height="96" rx="3" fill="#C2410C"/></g>
<text x="694" y="408" font-size="13.5" font-weight="700" fill="#7C2D12" text-anchor="middle">Rollups &amp; cache</text>
<g font-size="11" text-anchor="middle" fill="#9A4318">
  <text x="694" y="432">result cache · materialized rollups</text>
  <text x="694" y="454">ClickHouse / Druid / Pinot</text>
  <text x="694" y="470" font-size="10" font-style="italic" fill="#B4541C">sub-second, high-concurrency</text>
</g>

<!-- ============ STAGE 6: CONSUMERS (bottom) ============ -->
<text x="60" y="520" font-size="12" font-weight="700" fill="#3B1E78">⑥ CONSUMERS</text>
<g filter="url(#sh)"><rect x="56" y="530" width="1008" height="84" rx="13" fill="#F2ECFD" stroke="#C4A6F0"/></g>
<g>
  <rect x="80" y="550" width="300" height="46" rx="10" fill="#FFFFFF" stroke="#C4A6F0"/>
  <text x="230" y="570" font-size="13" font-weight="700" fill="#3B1E78" text-anchor="middle">Thousands of BI users</text>
  <text x="230" y="587" font-size="10.5" fill="#5B4690" text-anchor="middle">Tableau · Power BI · Sigma (cached)</text>
  <rect x="412" y="550" width="300" height="46" rx="10" fill="#FFFFFF" stroke="#C4A6F0"/>
  <text x="562" y="570" font-size="13" font-weight="700" fill="#3B1E78" text-anchor="middle">ML / Data science</text>
  <text x="562" y="587" font-size="10.5" fill="#5B4690" text-anchor="middle">feature store · training · inference</text>
  <rect x="744" y="550" width="296" height="46" rx="10" fill="#FFFFFF" stroke="#C4A6F0"/>
  <text x="892" y="570" font-size="13" font-weight="700" fill="#3B1E78" text-anchor="middle">Reverse-ETL</text>
  <text x="892" y="587" font-size="10.5" fill="#5B4690" text-anchor="middle">activate to ops / SaaS tools</text>
</g>

<!-- ============ ARROWS ============ -->
<g stroke="#475569" stroke-width="2.2" fill="none">
  <!-- ingest -> lakehouse -->
  <path d="M272,212 H320" marker-end="url(#arw)"/>
  <!-- registry feeds ingest stream (up small) -->
  <path d="M164,294 V268" marker-end="url(#arw)"/>
  <!-- lakehouse -> marts -->
  <path d="M536,238 H584" marker-end="url(#arw)"/>
  <!-- marts -> semantic -->
  <path d="M800,220 H848" marker-end="url(#arw)"/>
  <!-- semantic -> serving (down + left elbow) -->
  <path d="M958,280 V356 H694 V382" marker-end="url(#arw)"/>
  <!-- serving -> consumers -->
  <path d="M694,478 V530" marker-end="url(#arw)"/>
</g>

<!-- stage flow ribbon labels -->
<text x="296" y="206" font-size="9.5" fill="#475569" text-anchor="middle">stream</text>
<text x="560" y="232" font-size="9.5" fill="#475569" text-anchor="middle">load</text>
<text x="824" y="214" font-size="9.5" fill="#475569" text-anchor="middle">model</text>
<text x="975" y="350" font-size="9.5" fill="#475569" text-anchor="start">serve</text>

<!-- ============ LEGEND / FOOTER ============ -->
<text x="30" y="666" font-size="11.5" font-weight="700" fill="#374151">Medallion spine preserved:</text>
<g font-size="11" fill="#4B5563">
  <rect x="210" y="657" width="13" height="13" rx="3" fill="#FAEEDA" stroke="#C98A1E"/><text x="229" y="667">Bronze</text>
  <rect x="288" y="657" width="13" height="13" rx="3" fill="#ECECE6" stroke="#9A9A90"/><text x="307" y="667">Silver</text>
  <rect x="360" y="657" width="13" height="13" rx="3" fill="#EAF3DE" stroke="#8FBF63"/><text x="379" y="667">Gold (domain marts)</text>
  <rect x="514" y="657" width="13" height="13" rx="3" fill="#DEF3EC" stroke="#5FC0A6"/><text x="533" y="667">Semantic</text>
  <rect x="604" y="657" width="13" height="13" rx="3" fill="#FFF3E9" stroke="#E9A368"/><text x="623" y="667">Serving</text>
</g>
<line x1="30" y1="684" x2="1150" y2="684" stroke="#E5E7EB" stroke-width="1"/>
<text x="30" y="704" font-size="10.5" fill="#9CA3AF">Every layer becomes incremental, isolated, governed and monitored — the medallion architecture stays; the organization (data mesh) scales with it.</text>
</svg>
